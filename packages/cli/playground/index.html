<html lang="en">
<head>
<meta charset="utf-8" />

<title>XLE / XLO playground</title>
<style>
  :root { color-scheme: light dark; --bg:#fff; --fg:#1c1e21; --muted:#65676b; --line:#dadde1; --panel:#f5f6f7; --ok:#1a7f37; --err:#cf222e; --warn:#9a6700; --accent:#0866ff; }
  @media (prefers-color-scheme: dark) { :root { --bg:#18191a; --fg:#e4e6eb; --muted:#b0b3b8; --line:#3a3b3c; --panel:#242526; --accent:#4b9bff; } }
  * { box-sizing: border-box; }
  body { margin:0; font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--fg); }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:baseline; gap:12px; }
  header h1 { font-size:16px; margin:0; }
  header span { color:var(--muted); font-size:12px; }
  main { display:grid; grid-template-columns:1fr 1fr; gap:0; height:calc(100vh - 53px); }
  .col { display:flex; flex-direction:column; min-width:0; }
  .col + .col { border-left:1px solid var(--line); }
  .bar { padding:10px 16px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .bar label { font-size:12px; color:var(--muted); }
  select, button { font:inherit; padding:4px 10px; border-radius:6px; border:1px solid var(--line); background:var(--panel); color:var(--fg); cursor:pointer; }
  button.primary { background:var(--accent); color:#fff; border-color:transparent; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  textarea { flex:0 0 200px; resize:vertical; border:0; border-bottom:1px solid var(--line); padding:14px 16px; font:13px/1.6 ui-monospace,SFMono-Regular,Menlo,monospace; background:var(--bg); color:var(--fg); outline:none; tab-size:2; }
  .status { padding:8px 16px; font-size:12px; display:flex; gap:8px; align-items:center; border-bottom:1px solid var(--line); }
  .pill { padding:2px 8px; border-radius:999px; font-weight:600; font-size:11px; }
  .pill.ok { background:color-mix(in srgb,var(--ok) 18%,transparent); color:var(--ok); }
  .pill.err { background:color-mix(in srgb,var(--err) 18%,transparent); color:var(--err); }
  .pill.warn { background:color-mix(in srgb,var(--warn) 20%,transparent); color:var(--warn); }
  .scroll { flex:1; overflow:auto; }
  pre { margin:0; padding:14px 16px; font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace; white-space:pre; }
  .err-list { padding:10px 16px; }
  .err-row { color:var(--err); font:12px/1.5 ui-monospace,monospace; padding:4px 0; border-bottom:1px dashed var(--line); }
  .err-row b { color:var(--accent); font-weight:600; }
  .section-label { padding:8px 16px 2px; font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); border-top:1px solid var(--line); }
  .metrics { display:flex; gap:8px; padding:8px 16px; border-bottom:1px solid var(--line); }
  .metric { flex:1; border:1px solid var(--line); border-radius:6px; padding:6px 8px; background:var(--panel); }
  .metric .m-label { font-size:11px; color:var(--muted); }
  .metric .m-val { font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; }
  .metric .m-sub { font-size:11px; color:var(--muted); }
  .ex-head { display:flex; align-items:center; gap:8px; padding:8px 16px 4px; }
  .ex-head .section-label { border:0; padding:0; flex-shrink:0; }
  .search { flex:1; padding:4px 8px; border:1px solid var(--line); border-radius:6px; background:var(--bg); color:var(--fg); font:inherit; font-size:12px; }
  .browser { margin:0 16px 10px; border:1px solid var(--line); border-radius:6px; max-height:260px; overflow-y:auto; }
  .ex-cat { position:sticky; top:0; background:var(--panel); padding:3px 10px; font-size:10px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); border-bottom:1px solid var(--line); }
  .ex-item { display:flex; justify-content:space-between; align-items:center; gap:8px; width:100%; text-align:left; border:0; border-bottom:1px solid var(--line); background:transparent; color:var(--fg); cursor:pointer; padding:5px 10px; }
  .ex-item:hover { background:var(--panel); }
  .ex-item.active { background:color-mix(in srgb,var(--accent) 14%,transparent); }
  .ex-item .ex-label { font-size:12px; font-weight:600; }
  .ex-item .ex-expr { font-family:ui-monospace,monospace; font-size:10px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .ex-item .ex-tok { flex-shrink:0; font-size:10px; color:var(--muted); font-variant-numeric:tabular-nums; }
  .ex-col { min-width:0; display:flex; flex-direction:column; }
</style>
</head>
<body>
<header>
  <h1>XLE / XLO playground</h1>
  <span>compressed layout expressions → validated XDS TSX · standalone (no build)</span>
</header>
<main>
  <div class="col">
    <div class="bar">
      <label for="surface">Surface</label>
      <select id="surface">
        <option value="auto">Auto</option>
        <option value="compact">Compact (XLE)</option>
        <option value="outline">Outline (XLO)</option>
      </select>
      <button id="expand" class="primary">Expand →</button>
    </div>
    <textarea id="src" spellcheck="false"></textarea>
    <div class="status" id="status"><span class="pill warn">loading…</span></div>
    <div class="metrics" id="metrics"></div>
    <div class="err-list" id="errors"></div>
    <div class="ex-head">
      <span class="section-label">Examples</span>
      <input id="search" class="search" type="search" placeholder="Search examples…" />
    </div>
    <div class="browser" id="examples"></div>
    <div class="section-label">Canonical compact</div>
    <div class="scroll"><pre id="compact"></pre></div>
    <div class="section-label">Canonical outline</div>
    <div class="scroll"><pre id="outline"></pre></div>
  </div>
  <div class="col">
    <div class="bar"><label>Expanded TSX</label></div>
    <div class="scroll"><pre id="code">Press “Expand →”.</pre></div>
  </div>
</main>

const $ = id => document.getElementById(id);
const data = await fetch('/registry.json').then(r => r.json());
const REG = data.registry, BLOCKS = data.blocks;

const escapeHtml = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

// Tokenization is fully client-side: import the bundled tokenizer module the
// server emits (gpt-tokenizer o200k_base, esbuild-bundled; heuristic fallback).
const {countTokens: tok, ENCODER} = await import('/vendor/tokenizer.mjs');

function metricsHtml(inTok, inChars, outTok, outChars) {
  const ratio = inTok > 0 && outTok > 0 ? (outTok / inTok).toFixed(1) + '×' : '—';
  const cell = (label, val, sub) =>
    `<div class="metric"><div class="m-label">${label}</div><div class="m-val">${val}</div><div class="m-sub">${sub}</div></div>`;
  return cell('XLE input · ' + ENCODER, inTok + ' tok', inChars + ' chars') +
    cell('Output TSX · ' + ENCODER, outTok ? outTok + ' tok' : '—', outChars ? outChars + ' chars' : '—') +
    cell('Expansion', ratio, 'output ÷ input');
}

function paintMetrics(expr, code) {
  $('metrics').innerHTML = metricsHtml(tok(expr), expr.length, code ? tok(code) : 0, code ? code.length : 0);
}

function render() {
  const expr = $('src').value;
  // Always auto-detect: a compact expression never "fails" under an Outline view.
  const r = checkExpression(expr, REG, {blocks: BLOCKS, form: 'auto'});
  const status = $('status'), errors = $('errors');
  status.innerHTML = '';
  errors.innerHTML = '';
  if (r.ok && r.valid) {
    status.innerHTML = `<span class="pill ok">Valid · ${r.form}</span>` +
      (r.warnings.length ? `<span class="pill warn">${r.warnings.length} warning</span>` : '');
    $('compact').textContent = r.compact;
    $('outline').textContent = r.outline;
    $('expand').disabled = false;
    const code = doExpand(); // live "rendered source"
    paintMetrics(expr, code);
  } else {
    status.innerHTML = `<span class="pill err">${r.errors.length} error${r.errors.length===1?'':'s'}</span>`;
    errors.innerHTML = r.errors.map(e =>
      `<div class="err-row">${escapeHtml(e.formatted)}${e.suggestions?.length ? ` <b>→ ${escapeHtml(e.suggestions.join(', '))}</b>` : ''}</div>`
    ).join('');
    $('compact').textContent = '';
    $('outline').textContent = '';
    $('code').textContent = '';
    $('expand').disabled = true;
    paintMetrics(expr, '');
  }
}

function doExpand() {
  const r = expandExpression($('src').value, REG, {blocks: BLOCKS, form: 'auto', name: 'PlaygroundLayout'});
  const code = r.ok ? r.code : r.errors.map(e => e.formatted).join('\n');
  $('code').textContent = code;
  return r.ok ? code : '';
}

// Switching surface converts the current expression to that dialect.
function switchSurface() {
  const v = $('surface').value;
  if (v !== 'auto') {
    const c = checkExpression($('src').value, REG, {blocks: BLOCKS, form: 'auto'});
    if (c.ok && c.valid) $('src').value = v === 'compact' ? c.compact : c.outline;
  }
  render();
}

// Searchable, categorized example browser.
let activeLabel = EXAMPLES[0][1];
function renderBrowser(query) {
  const q = (query || '').trim().toLowerCase();
  const match = ([cat, label, expr]) =>
    !q || label.toLowerCase().includes(q) || cat.toLowerCase().includes(q) || expr.toLowerCase().includes(q);
  const cats = [...new Set(EXAMPLES.map(e => e[0]))];
  let html = '';
  for (const cat of cats) {
    const rows = EXAMPLES.map((e, i) => [e, i]).filter(([e]) => e[0] === cat && match(e));
    if (!rows.length) continue;
    html += `<div class="ex-cat">${escapeHtml(cat)}</div>`;
    for (const [e, i] of rows) {
      const active = e[1] === activeLabel ? ' active' : '';
      html += `<button class="ex-item${active}" data-i="${i}"><span class="ex-col"><span class="ex-label">${escapeHtml(e[1])}</span><span class="ex-expr">${escapeHtml(e[2].replace(/\n/g, ' ⏎ '))}</span></span><span class="ex-tok">${tok(e[2])} tok</span></button>`;
    }
  }
  $('examples').innerHTML = html || '<div class="ex-cat">No matches</div>';
}

$('examples').addEventListener('click', e => {
  const btn = e.target.closest('.ex-item');
  if (!btn) return;
  const ex = EXAMPLES[btn.dataset.i];
  activeLabel = ex[1];
  $('src').value = ex[2];
  $('surface').value = 'auto'; // examples carry their own surface
  render();
  renderBrowser($('search').value);
});
$('search').addEventListener('input', e => renderBrowser(e.target.value));
$('src').addEventListener('input', render);
$('surface').addEventListener('change', switchSurface);
$('expand').addEventListener('click', doExpand);

renderBrowser('');
$('src').value = EXAMPLES[0][2];
render();
</script>
</body>
</html>
