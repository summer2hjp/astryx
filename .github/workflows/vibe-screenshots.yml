name: Vibe Test Screenshots

on:
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Comma-separated iteration IDs to screenshot'
        required: true
      prompts:
        description: 'Comma-separated prompt IDs (optional, defaults to all)'
        required: false
        default: ''

concurrency:
  group: vibe-screenshots-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  build-previews:
    name: Build Previews
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build core packages
        run: yarn build

      - name: Build preview HTML files
        run: |
          cd internal/vibe-tests
          PROMPT_ARG=""
          if [ -n "${{ github.event.inputs.prompts }}" ]; then
            PROMPT_ARG="--prompts ${{ github.event.inputs.prompts }}"
          fi
          npx tsx src/build-previews.ts \
            --iterations "${{ github.event.inputs.iterations }}" \
            $PROMPT_ARG

      - name: Upload preview HTML
        uses: actions/upload-artifact@v4
        with:
          name: preview-html
          path: internal/vibe-tests/results/*/previews/
          retention-days: 90

  screenshot:
    name: Capture Screenshots
    needs: build-previews
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Download preview HTML
        uses: actions/download-artifact@v4
        with:
          name: preview-html
          path: internal/vibe-tests/results/

      - name: Screenshot all previews
        run: |
          cd internal/vibe-tests
          npx tsx src/screenshot-previews.ts \
            --iterations "${{ github.event.inputs.iterations }}"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: vibe-test-screenshots
          path: internal/vibe-tests/results/*/screenshots/
          retention-days: 90

      - name: Upload screenshot manifest
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-manifest
          path: internal/vibe-tests/results/*/screenshots/manifest.json
          retention-days: 90
