# Deploy Storybook to GitHub Pages
# Only runs on push to main — simple and sequential: sync → test → deploy
name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  # Sync package.json exports with src/ and commit if changed.
  # Runs first so test and deploy always see correct exports.
  sync-exports:
    # Skip runs triggered by our own auto-commits to avoid loops
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync package.json exports
        run: node scripts/sync-exports.js

      - name: Create PR if exports changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git diff --quiet packages/core/package.json && exit 0

          # Check if there's already an open sync-exports PR
          EXISTING=$(gh pr list --head "chore/sync-exports" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Sync-exports PR #$EXISTING already open — updating it"
            BRANCH=$(gh pr view "$EXISTING" --json headRefName --jq '.headRefName')
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git fetch origin "$BRANCH" 2>/dev/null || true
            git checkout -B "$BRANCH"
            git add packages/core/package.json
            git commit -m "chore: sync package.json exports"
            git push origin "$BRANCH" --force-with-lease
          else
            BRANCH="chore/sync-exports"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git add packages/core/package.json
            git commit -m "chore: sync package.json exports"
            git push origin "$BRANCH"
            gh pr create \
              --title "chore: sync package.json exports" \
              --body "Auto-generated by the sync-exports CI step. Package.json exports were out of sync with the source tree." \
              --head "$BRANCH" \
              --base main
          fi

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - run: yarn install --frozen-lockfile

      - run: yarn test

      - run: yarn build

  deploy:
    needs: test
    if: always() && !cancelled() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build core package
        run: yarn build

      - name: Build Storybook
        run: yarn workspace @xds/storybook build

      - name: Compute short hash
        id: hash
        run: echo "short_hash=${GITHUB_SHA:0:7}" >> $GITHUB_OUTPUT

      - name: Build Sandbox
        run: yarn workspace @xds/sandbox build
        env:
          SANDBOX_BASE_PATH: /${{ steps.hash.outputs.short_hash }}/sandbox

      - name: Prepare deployment
        run: |
          SHORT_HASH="${GITHUB_SHA:0:7}"
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_OWNER="${{ github.repository_owner }}"

          mkdir -p deploy/${SHORT_HASH}
          cp -r apps/storybook/dist/* deploy/${SHORT_HASH}/

          if [ -d "apps/sandbox/out" ]; then
            mkdir -p deploy/${SHORT_HASH}/sandbox
            cp -r apps/sandbox/out/* deploy/${SHORT_HASH}/sandbox/
          fi

          # Copy XDS dist CSS for the landing page
          mkdir -p deploy/assets
          cp packages/core/dist/xds.css deploy/assets/xds.css 2>/dev/null || true
          cp packages/core/src/reset.css deploy/assets/reset.css 2>/dev/null || true
          cp packages/themes/default/dist/theme.css deploy/assets/theme.css 2>/dev/null || true

          cat > deploy/index.html << 'LANDING_EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>XDS Design System</title>
            <link rel="stylesheet" href="assets/reset.css">
            <link rel="stylesheet" href="assets/xds.css">
            <link rel="stylesheet" href="assets/theme.css">
            <style>
              body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--color-wash);
                font-family: var(--font-body);
                color: var(--color-text-primary);
              }
              .container {
                max-width: 480px;
                width: 100%;
                padding: var(--spacing-6);
              }
              h1 { font-size: var(--heading-1-size, 1.5rem); font-weight: var(--font-weight-semibold); margin-bottom: var(--spacing-2); }
              p { color: var(--color-text-secondary); margin-bottom: var(--spacing-6); font-size: var(--text-body-size, 0.875rem); line-height: 1.5; }
              .links { display: flex; flex-direction: column; gap: var(--spacing-3); }
              a.card {
                display: flex; align-items: center; justify-content: space-between;
                padding: var(--spacing-4);
                background: var(--color-card);
                border-radius: var(--radius-element);
                box-shadow: var(--elevation-base);
                text-decoration: none;
                color: var(--color-text-primary);
                transition: box-shadow 0.15s ease;
              }
              a.card:hover { box-shadow: var(--elevation-hover); }
              .card-title { font-weight: var(--font-weight-semibold); }
              .card-desc { font-size: var(--text-supporting-size, 0.75rem); color: var(--color-text-secondary); margin-top: 2px; }
              .arrow { color: var(--color-text-secondary); font-size: 1.25rem; }
              .hash { font-family: var(--font-code); font-size: var(--text-supporting-size, 0.75rem); color: var(--color-text-secondary); margin-top: var(--spacing-4); text-align: center; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>XDS Design System</h1>
              <p>Component library for building internal tools. Select an environment below.</p>
              <div class="links">
                <a class="card" id="storybook-link" href="#">
                  <div>
                    <div class="card-title">📖 Storybook</div>
                    <div class="card-desc">Component docs, props, and interactive examples</div>
                  </div>
                  <span class="arrow">→</span>
                </a>
                <a class="card" id="sandbox-link" href="#">
                  <div>
                    <div class="card-title">🏗️ Sandbox</div>
                    <div class="card-desc">Full app demo with theme editor</div>
                  </div>
                  <span class="arrow">→</span>
                </a>
                <a class="card" href="https://github.com/facebookexperimental/xds">
                  <div>
                    <div class="card-title">💻 GitHub</div>
                    <div class="card-desc">Source code, issues, and wiki</div>
                  </div>
                  <span class="arrow">→</span>
                </a>
              </div>
              <div class="hash" id="commit-hash"></div>
            </div>
            <script>
              // Resolve links from the `latest` file so they always point
              // to the most recently deployed hash — even if a newer main
              // commit is still building and the sed-injected hash is stale.
              fetch('latest')
                .then(r => r.ok ? r.text() : null)
                .then(hash => {
                  if (!hash) return;
                  hash = hash.trim();
                  const sb = document.getElementById('storybook-link');
                  const bx = document.getElementById('sandbox-link');
                  const cm = document.getElementById('commit-hash');
                  if (sb) sb.href = hash + '/index.html';
                  if (bx) bx.href = hash + '/sandbox/index.html';
                  if (cm) cm.textContent = 'Build: ' + hash;
                })
                .catch(() => {}); // fallback to sed-injected links
            </script>
          </body>
          </html>
          LANDING_EOF

          # Also deploy to a stable `storybook/` directory so links like
          # .../storybook/index.html?path=/docs/core-xdsbutton--docs
          # never break when hash directories get cleaned up.
          mkdir -p deploy/storybook
          cp -r apps/storybook/dist/* deploy/storybook/

          if [ -d "apps/sandbox/out" ]; then
            mkdir -p deploy/sandbox
            cp -r apps/sandbox/out/* deploy/sandbox/
          fi

          # Write the latest deployed hash so the landing page can resolve
          # links dynamically. This survives cleanup and avoids stale links
          # when a newer main commit is pending deploy.
          echo -n "${SHORT_HASH}" > deploy/latest

          # Inject the short hash into the landing page as a fallback
          sed -i "s|id=\"storybook-link\" href=\"#\"|id=\"storybook-link\" href=\"${SHORT_HASH}/index.html\"|" deploy/index.html
          sed -i "s|id=\"sandbox-link\" href=\"#\"|id=\"sandbox-link\" href=\"${SHORT_HASH}/sandbox/index.html\"|" deploy/index.html
          sed -i "s|id=\"commit-hash\"|id=\"commit-hash\">Build: ${SHORT_HASH}</div><!--done|" deploy/index.html

          touch deploy/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: true
          destination_dir: .
