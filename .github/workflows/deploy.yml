# Deploy Storybook + Sandbox to GitHub Pages, and publish @canary prereleases
# from latest main. Stable npm releases live in release.yml (manually dispatched)
# so they don't share this workflow's pages-deploy concurrency.
# Only runs on push to main — simple and sequential: sync → test → deploy + canary
#
# Deployment layout on gh-pages:
#   /storybook/    — stable Storybook (always latest main)
#   /sandbox/      — stable Sandbox (always latest main)
#   /pr/<number>/  — PR preview dirs (managed by ci.yml, preserved here)
#   /reports/      — vibe test reports (preserved)
#   /assets/       — landing page CSS
#   /index.html    — landing page
#   /latest        — short hash of latest deploy
#
# Uses keep_files:false + force_orphan:true — each deploy is a clean slate.
# PR previews and reports are preserved by copying them from gh-pages before
# deploying, but old generated artifact history is not retained.
name: Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions: {}

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

jobs:
  # Verify package.json exports match the source tree.
  # Fails if exports are stale — run `node scripts/sync-exports.js` locally to fix.
  sync-exports:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Check package.json exports are in sync
        run: node scripts/sync-exports.js --check


  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: main

      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm test

      - run: pnpm build

  deploy:
    needs: test
    if: always() && !cancelled() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build core package
        run: pnpm build

      - name: Build Storybook
        run: pnpm -F @astryxdesign/storybook build

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: apps/sandbox/.next/cache
          # IMPORTANT: no restore-keys fallback. The key is pinned to the
          # @astryxdesign/core dist hash because the Next.js module cache bakes in the
          # resolved export graph of @astryxdesign/core. A loose restore-keys fallback
          # (e.g. "nextjs-sandbox-<lock>-") would let a build restore a cache
          # produced against a DIFFERENT export shape. That is exactly what
          # broke the post-merge deploy of the XDS un-prefix migration (#2941):
          # the migration changed core's exports (bare names, new subpaths), the
          # exact key missed, and restore-keys fell back to a pre-migration
          # cache whose compiled modules still expected XDS*-prefixed exports —
          # producing "'Text' is not exported from '@astryxdesign/core/Text'" and
          # "Element type is invalid ... undefined" prerender failures.
          # A changed key now yields a COLD cache (safe rebuild) instead of a
          # poisoned warm one.
          key: nextjs-sandbox-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('packages/core/dist/**') }}

      - name: Build Sandbox
        run: pnpm -F @astryxdesign/sandbox build
        env:
          SANDBOX_BASE_PATH: /sandbox
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Preserve PR previews and reports from gh-pages
        run: |
          # Clone current gh-pages to rescue PR previews and reports
          # before the clean deploy wipes everything.
          git clone --depth=1 --single-branch --branch gh-pages \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" \
            /tmp/gh-pages 2>/dev/null || true

          if [ -d "/tmp/gh-pages" ]; then
            # Preserve PR preview directories
            if [ -d "/tmp/gh-pages/pr" ]; then
              echo "Preserving PR previews"
              cp -r /tmp/gh-pages/pr /tmp/preserved-pr
            fi

            # Preserve vibe test reports
            if [ -d "/tmp/gh-pages/reports" ]; then
              echo "Preserving reports"
              cp -r /tmp/gh-pages/reports /tmp/preserved-reports
            fi

            rm -rf /tmp/gh-pages
          fi

      - name: Prepare deployment
        run: |
          SHORT_HASH="${GITHUB_SHA:0:7}"

          # Stable storybook
          mkdir -p deploy/storybook
          cp -r apps/storybook/dist/* deploy/storybook/

          # Stable sandbox (built with basePath=/sandbox)
          if [ -d "apps/sandbox/out" ]; then
            mkdir -p deploy/sandbox
            cp -r apps/sandbox/out/* deploy/sandbox/
          fi

          # Restore preserved PR previews and reports
          if [ -d "/tmp/preserved-pr" ]; then
            cp -r /tmp/preserved-pr deploy/pr
            echo "Restored $(ls deploy/pr/ | wc -l) PR preview(s)"
          fi
          if [ -d "/tmp/preserved-reports" ]; then
            cp -r /tmp/preserved-reports deploy/reports
            echo "Restored reports"
          fi

          # Copy XDS dist CSS for the landing page
          mkdir -p deploy/assets
          cp packages/core/dist/astryx.css deploy/assets/astryx.css
          cp packages/core/src/reset.css deploy/assets/reset.css
          cp packages/themes/neutral/dist/theme.css deploy/assets/theme.css

          cat > deploy/index.html << 'LANDING_EOF'
          <!DOCTYPE html>
          <html lang="en" data-astryx-theme="neutral">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Astryx Design System</title>
            <link rel="stylesheet" href="assets/reset.css">
            <link rel="stylesheet" href="assets/astryx.css">
            <link rel="stylesheet" href="assets/theme.css">
            <style>
              body {
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--color-background-body);
                font-family: var(--font-family-body);
                color: var(--color-text-primary);
              }
              .container {
                max-width: 480px;
                width: 100%;
                padding: var(--spacing-6);
              }
              h1 { font-size: var(--text-heading-1-size); font-weight: var(--font-weight-semibold); margin-bottom: var(--spacing-2); }
              p { color: var(--color-text-secondary); margin-bottom: var(--spacing-6); font-size: var(--text-body-size); line-height: 1.5; }
              .links { display: flex; flex-direction: column; gap: var(--spacing-3); }
              a.card {
                display: flex; align-items: center; justify-content: space-between;
                padding: var(--spacing-4);
                background: var(--color-background-card);
                border-radius: var(--radius-element);
                box-shadow: var(--shadow-low);
                text-decoration: none;
                color: var(--color-text-primary);
                transition: box-shadow 0.15s ease;
              }
              a.card:hover { box-shadow: var(--shadow-med); }
              .card-title { font-weight: var(--font-weight-semibold); }
              .card-desc { font-size: var(--text-supporting-size); color: var(--color-text-secondary); margin-top: 2px; }
              .arrow { color: var(--color-text-secondary); font-size: 1.25rem; }
              .hash { font-family: var(--font-family-code); font-size: var(--text-supporting-size); color: var(--color-text-secondary); margin-top: var(--spacing-4); text-align: center; }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>Astryx Design System</h1>
              <p>Component library for building internal tools. Select an environment below.</p>
              <div class="links">
                <a class="card" href="storybook/index.html">
                  <div>
                    <div class="card-title">📖 Storybook</div>
                    <div class="card-desc">Component docs, props, and interactive examples</div>
                  </div>
                  <span class="arrow">→</span>
                </a>
                <a class="card" href="sandbox/index.html">
                  <div>
                    <div class="card-title">🏗️ Sandbox</div>
                    <div class="card-desc">Full app demo with theme editor</div>
                  </div>
                  <span class="arrow">→</span>
                </a>
                <a class="card" href="https://github.com/facebookexperimental/xds">
                  <div>
                    <div class="card-title">💻 GitHub</div>
                    <div class="card-desc">Source code, issues, and wiki</div>
                  </div>
                  <span class="arrow">→</span>
                </a>
              </div>
              <div class="hash">Build: DEPLOY_HASH_PLACEHOLDER</div>
            </div>
          </body>
          </html>
          LANDING_EOF

          # Inject the short hash into the landing page
          sed -i "s|DEPLOY_HASH_PLACEHOLDER|${SHORT_HASH}|" deploy/index.html

          # Write the latest deployed hash (used by PR comment links, etc.)
          echo -n "${SHORT_HASH}" > deploy/latest

          touch deploy/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./deploy
          keep_files: false
          force_orphan: true
          destination_dir: .

  # Publish canary versions to the public npm registry on every push to main.
  # The @canary dist-tag always points to the latest main commit:
  #   npm install @astryxdesign/core@canary
  canary:
    name: Publish canary to npm
    needs: test
    if: always() && !cancelled() && needs.test.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm OIDC trusted publishing + provenance
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Publish canary versions
        # Pure OIDC trusted publishing — no NPM_TOKEN.
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          BASE_VERSION=$(node -p "require('./packages/core/package.json').version")
          CANARY_VERSION="${BASE_VERSION}-canary.${SHORT_SHA}"

          echo "Publishing canary ${CANARY_VERSION}"

          # Stamp canary version into all publishable packages
          for pkg in packages/*/package.json packages/themes/*/package.json; do
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('$pkg','utf8'));
              if (p.private || !p.name?.startsWith('@astryxdesign/')) process.exit(0);
              p.version = '${CANARY_VERSION}';
              for (const dt of ['dependencies','peerDependencies','devDependencies']) {
                if (!p[dt]) continue;
                for (const [k,v] of Object.entries(p[dt])) {
                  if (k.startsWith('@astryxdesign/')) p[dt][k] = '${CANARY_VERSION}';
                }
              }
              fs.writeFileSync('$pkg', JSON.stringify(p, null, 2) + '\n');
              console.log('  ' + p.name + ' → ${CANARY_VERSION}');
            "
          done

          # Publish each package with --tag canary
          for pkg_dir in packages/* packages/themes/*; do
            [ -f "$pkg_dir/package.json" ] || continue
            IS_PUBLISHABLE=$(node -p "const p=require('./$pkg_dir/package.json'); !p.private && p.name?.startsWith('@astryxdesign/') ? 'yes' : 'no'")
            if [ "$IS_PUBLISHABLE" = "yes" ]; then
              NAME=$(node -p "require('./$pkg_dir/package.json').name")
              echo "Publishing ${NAME}@${CANARY_VERSION}"
              pnpm publish "./$pkg_dir" --tag canary --provenance --access public --no-git-checks || true
            fi
          done

          echo "Canary published: npm install @astryxdesign/core@${CANARY_VERSION}"
